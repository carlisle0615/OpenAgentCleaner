name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Format check
        run: |
          gofmt -w main.go internal/cleaner/*.go
          git diff --exit-code

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Check shell scripts
        run: sh -n install.sh scripts/install-local.sh scripts/generate-homebrew-formula.sh scripts/uninstall.sh
